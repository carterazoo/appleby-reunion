    :root {

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--cream); font-family: 'Lato', sans-serif; color: var(--charcoal); min-height: 100vh; }

    .navbar { background-color: var(--green); position: sticky; top: 0; z-index: 100; }

    .nav-links a { color: #d8f0d8; text-decoration: none; font-size: 0.85rem; font-weight: 700; padding: 8px 10px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold-light); }
    .nav-icons { display: flex; align-items: center; gap: 4px; margin-left: 8px; }
    .icon-link { color: #d8f0d8; display: flex; align-items: center; padding: 6px; transition: color 0.2s; }
    .icon-link:hover { color: var(--gold-light); }
    .dropdown { position: relative; }
    .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background-color: var(--green); min-width: 160px; border-top: 2px solid var(--gold); list-style: none; }
    .dropdown-menu li a { display: block; padding: 10px 16px; font-size: 0.8rem; }
    .dropdown:hover .dropdown-menu { display: block; }
    .nav-toggle { display: none; background: none; border: none; color: var(--gold-light); font-size: 1.5rem; cursor: pointer; }

    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links { display: none; flex-direction: column; position: absolute; top: 60px; left: 0; right: 0; background-color: var(--green); padding: 16px 0; gap: 0; }
      .nav-links.open { display: flex; }
      .nav-links li { width: 100%; text-align: center; }
      .nav-links a { display: block; padding: 12px 20px; }
      .nav-icons { justify-content: center; padding: 8px 0; }
      .dropdown-menu { position: static; border-top: none; border-left: 3px solid var(--gold); margin-left: 20px; }
      .dropdown:hover .dropdown-menu { display: block; }
    }
    .page-header { background-color: var(--green); color: #d8f0d8; text-align: center; padding: 48px 24px 40px; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; color: #ffffff; margin-bottom: 8px; }
    .page-header p { font-size: 0.95rem; color: var(--gold-light); letter-spacing: 0.05em; }
    .main { max-width: 900px; margin: 0 auto; padding: 52px 24px 80px; }
    .reunion-card { background-color: #ffffff; border: 1px solid #e8e0d0; border-radius: 16px; padding: 40px; margin-bottom: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .reunion-card h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--green); margin-bottom: 6px; }
    .reunion-card .reunion-meta { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 24px; }
    .coming-soon-box { border: 2px dashed #d0c8b8; border-radius: 10px; padding: 40px 24px; text-align: center; }
    .coming-soon-box p { color: #888; font-size: 1rem; line-height: 1.7; }
    .coming-soon-icon { font-size: 2.5rem; display: block; margin-bottom: 16px; }
    .footer { background-color: var(--green); color: #d8f0d8; text-align: center; padding: 24px 20px; font-size: 0.8rem; letter-spacing: 0.05em; }
